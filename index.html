<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notion Widget</title>
<style>
body{margin:0;background:#111827;color:#fff;font-family:Arial;display:flex;align-items:center;justify-content:center;height:100vh}
.card{width:min(420px,95vw);padding:20px;border-radius:16px;background:#1f2937;text-align:center}
#time{font-size:42px;font-weight:bold}#date{margin-top:10px;font-size:18px}
</style></head>
<body><div class="card">
<h2>📱 Facebook Creator OS</h2>
<div id="time"></div><div id="date"></div>
<p>🎯 Goal: 6:00 AM & 9:00 PM</p>
</div>
<script>
function u(){const n=new Date();
time.textContent=n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true,timeZone:'Asia/Kolkata'});
date.textContent=n.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Kolkata'});}
u();setInterval(u,1000);
</script></body></html>

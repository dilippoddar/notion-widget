<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion Weather Widget</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e293b);
}
.card{
width:340px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.10);
backdrop-filter:blur(20px);
color:#fff;
text-align:center;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 10px 30px rgba(0,0,0,.35);
}
#time{
font-size:42px;
font-weight:bold;
}
#date{
margin:10px 0 20px;
font-size:17px;
opacity:.85;
}
.weather{
padding:15px;
border-radius:18px;
background:rgba(255,255,255,.08);
}
.temp{
font-size:32px;
font-weight:bold;
margin:8px 0;
}
.city{
font-size:14px;
opacity:.8;
}
</style>

</head>
<body>

<div class="card">

<div id="time"></div>

<div id="date"></div>

<div class="weather">

<div class="city">📍 Bhopal, India</div>

<div class="temp" id="temp">--°C</div>

<div id="condition">Loading...</div>

</div>

</div>

<script>

function clock(){

const now=new Date();

document.getElementById("time").innerHTML=
now.toLocaleTimeString("en-IN",{
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
hour12:true,
timeZone:"Asia/Kolkata"
});

document.getElementById("date").innerHTML=
now.toLocaleDateString("en-IN",{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric",
timeZone:"Asia/Kolkata"
});

}

clock();

setInterval(clock,1000);

async function weather(){

const url="https://api.open-meteo.com/v1/forecast?latitude=23.2599&longitude=77.4126&current=temperature_2m,weather_code";

const res=await fetch(url);

const data=await res.json();

document.getElementById("temp").innerHTML=data.current.temperature_2m+"°C";

const code=data.current.weather_code;

let text="☀️ Clear";

if(code<=3) text="⛅ Partly Cloudy";
if(code>=45) text="🌫️ Fog";
if(code>=51) text="🌧️ Rain";
if(code>=95) text="⛈️ Thunderstorm";

document.getElementById("condition").innerHTML=text;

}

weather();

setInterval(weather,600000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:transparent;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

#datetime{

font-size:22px;
font-weight:700;
color:#000;

text-shadow:
0 0 2px #FFD700,
0 0 5px #FFD700,
0 0 10px #FFC107;

white-space:nowrap;

}

@media(max-width:480px){

#datetime{
font-size:18px;
}

}

</style>

</head>

<body>

<div id="datetime"></div>

<script>

function update(){

const now=new Date();

const date=now.toLocaleDateString("en-IN",{
weekday:"short",
day:"2-digit",
month:"short",
year:"numeric"
});

const time=now.toLocaleTimeString("en-IN",{
hour:"2-digit",
minute:"2-digit",
second:"2-digit",
hour12:true
});

document.getElementById("datetime").innerHTML=date+" | "+time;

}

update();

setInterval(update,1000);

</script>

</body>
</html>
